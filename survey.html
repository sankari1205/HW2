<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS Department Survey</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .gmu-green {
            color: #006633;
        }
        .gmu-yellow {
            color: #FFCC33;
        }
        .gmu-border {
            border: 5px solid #006633;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            padding: 10px;
            text-align: center;
        }
        h1 {
            color: #006633;
        }
        .btn-custom {
            background-color: #FFCC33;
            border-color: #FFCC33;
        }
        .btn-custom:hover {
            background-color: #006633;
            border-color: #006633;
        }
        .required {
            color: red;
        }
    </style>
</head>
<script>
document.querySelector("form").addEventListener("submit", function(event) {
    const raffleInput = document.getElementById("raffle").value.trim();
    const errorDiv = document.getElementById("raffle-error");
    errorDiv.textContent = "";

    const nums = raffleInput.split(",").map(n => n.trim()).filter(n => n !== "");

    if (nums.length < 10) {
        errorDiv.textContent = "Please enter at least 10 numbers.";
        event.preventDefault();
        return;
    }

    for (let n of nums) {
        const val = Number(n);
        if (!Number.isInteger(val) || val < 1 || val > 100) {
            errorDiv.textContent = "All raffle numbers must be integers between 1 and 100.";
            event.preventDefault();
            return;
        }
    }
});
</script>


<body>
    <div class="container mt-5">
        <div class="gmu-border">
            <h1>Student Survey </h1>
        </div>
        <form autocomplete="on" class="mt-4">
            <div class="mb-3">
                <label for="fname" class="form-label">First Name <span class="required">*</span></label>
                <input type="text" id="fname" class="form-control" required autofocus placeholder="Enter your first name">
            </div>
            <div class="mb-3">
                <label for="lname" class="form-label">Last Name <span class="required">*</span></label>
                <input type="text" id="lname" class="form-control" required autofocus placeholder="Enter your last name">
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Street Address: <span class="required">*</span></label>
                <input type="text" id="address" class="form-control" required placeholder="Enter your street address">
            </div>
            <div class="mb-3">
                <label for="city" class="form-label">City: <span class="required">*</span></label>
                <input type="text" id="city" class="form-control" required placeholder="Enter your city">
            </div>
            <div class="mb-3">
                <label for="state" class="form-label">State: <span class="required">*</span></label>
                <input type="text" id="state" class="form-control" required placeholder="Enter your state">
            </div>
            <div class="mb-3">
                <label for="zip" class="form-label">Zip Code: <span class="required">*</span></label>
                <input type="text" id="zip" class="form-control" required pattern="\d{5}" placeholder="Enter your zip code">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Telephone Number: <span class="required">*</span></label>
                <input type="tel" id="phone" class="form-control" required placeholder="Enter your phone number">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email: <span class="required">*</span></label>
                <input type="email" id="email" class="form-control" required placeholder="your-email@gmu.edu">
            </div>
            <div class="mb-3">
                <label for="url" class="form-label">Personal Website (if any):</label>
                <input type="url" id="url" class="form-control" placeholder="https://example.com">
            </div>
            <div class="mb-3">
                <label for="survey-date" class="form-label">Date of Survey: <span class="required">*</span></label>
                <input type="date" id="survey-date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">What did you like most about the campus?</label><br>
                <input type="checkbox" id="students"> <label for="students">Students</label>
                <input type="checkbox" id="location"> <label for="location">Location</label>
                <input type="checkbox" id="campus"> <label for="campus">Campus</label>
                <input type="checkbox" id="atmosphere"> <label for="atmosphere">Atmosphere</label>
                <input type="checkbox" id="dorms"> <label for="dorms">Dorm Rooms</label>
                <input type="checkbox" id="sports"> <label for="sports">Sports</label>
            </div>
            <div class="mb-3">
                <label class="form-label">How did you hear about us?</label><br>
                <input type="radio" name="interest" id="friends"> <label for="friends">Friends</label>
                <input type="radio" name="interest" id="television"> <label for="television">Television</label>
                <input type="radio" name="interest" id="internet"> <label for="internet">Internet</label>
                <input type="radio" name="interest" id="other"> <label for="other">Other</label>
            </div>
            <div class="mb-3">
                <label for="graduation-month" class="form-label">High-School Graduation Month:</label>
                <input list="months" id="graduation-month" class="form-control">
                <datalist id="months">
                    <option value="January">
                    <option value="February">
                    <option value="March">
                    <option value="April">
                    <option value="May">
                    <option value="June">
                    <option value="July">
                    <option value="August">
                    <option value="September">
                    <option value="October">
                    <option value="November">
                    <option value="December">
                </datalist>
            </div>
            <div class="mb-3">
                <label for="graduation-year" class="form-label">Graduation Year: <span class="required">*</span></label>
                <input type="number"
                    id="graduation-year"
                    class="form-control"
                    required
                    placeholder="YYYY"
                    min="1900"
                    max="2100"
                    step="1">
            </div>
            <div class="mb-3">
                <label for="recommend" class="form-label">Would you recommend us?</label>
                <select id="recommend" class="form-control">
                    <option>Very Likely</option>
                    <option>Likely</option>
                    <option>Unlikely</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="comments" class="form-label">Additional Comments:</label>
                <textarea id="comments" class="form-control" rows="4" placeholder="Share your thoughts..."></textarea>
            </div>
            
            <div class="mb-3">
                <label for="raffle" class="form-label">
                    Raffle Numbers <span class="required">*</span>
                </label>
                <input type="text" id="raffle" class="form-control" required
                    placeholder="Enter at least 10 comma separated numbers from 1 to 100">
              
                <div id="raffle-error" class="text-danger"></div>
            </div>


            <button type="submit" class="btn btn-custom">Submit</button>
            <button type="button" class="btn btn-secondary ms-2"
        onclick="if(confirm('Do you want to clear the form?')) this.form.reset();">
    Cancel
</button>

        </form>
        
    </div>
</body>
</html>
